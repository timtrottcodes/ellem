<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ellem - Local AI with a Great UI</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css?v=2.3">
</head>
<body class="dark-mode">
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark-blue">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="bi bi-robot"></i> Ellem
            </a>
            <div class="navbar-nav ms-auto">
                <button class="btn btn-sm btn-outline-light me-2" id="serverProfileBtn">
                    <i class="bi bi-server"></i> Server Profile
                </button>
                <button class="btn btn-sm btn-outline-light me-2" id="exportBtn">
                    <i class="bi bi-download"></i> Export
                </button>
                <button class="btn btn-sm btn-outline-light" id="themeToggle">
                    <i class="bi bi-sun"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container-fluid main-container">
        <div class="row h-100">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 sidebar" id="sidebar">
                <div class="sidebar-header">
                    <button class="btn btn-primary w-100 mb-3" id="newChatBtn">
                        <i class="bi bi-plus-lg"></i> New Chat
                    </button>
                </div>

                <!-- Accordion for Chats and Prompts -->
                <div class="accordion" id="sidebarAccordion">
                    <!-- Chat History Section -->
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#chatHistory">
                                <i class="bi bi-chat-dots me-2"></i> Chat History
                            </button>
                        </h2>
                        <div id="chatHistory" class="accordion-collapse collapse show" data-bs-parent="#sidebarAccordion">
                            <div class="accordion-body">
                                <div id="chatHistoryList" class="chat-history-list">
                                    <!-- Chat history items will be populated here -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Prompt Manager Section -->
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#promptManager">
                                <i class="bi bi-bookmark me-2"></i> Prompt Manager
                            </button>
                        </h2>
                        <div id="promptManager" class="accordion-collapse collapse" data-bs-parent="#sidebarAccordion">
                            <div class="accordion-body">
                                <button class="btn btn-sm btn-outline-primary w-100 mb-2" id="newPromptBtn">
                                    <i class="bi bi-plus"></i> New Prompt
                                </button>
                                <div id="promptList" class="prompt-list">
                                    <!-- Prompts will be populated here -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Chat Area -->
            <div class="col-md-9 col-lg-10 chat-area">
                <!-- Connection Status Bar -->
                <div class="connection-status" id="connectionStatus">
                    <div class="status-indicator">
                        <span class="status-dot disconnected"></span>
                        <span id="statusText">Not Connected</span>
                    </div>
                    <div class="stats-container" id="statsContainer" style="display: none;">
                        <span class="stat-item"><i class="bi bi-clock"></i> <span id="connectionTime">-</span></span>
                        <span class="stat-item"><i class="bi bi-speedometer"></i> <span id="responseTime">-</span></span>
                        <span class="stat-item"><i class="bi bi-cpu"></i> <span id="tokensPerSec">-</span> tok/s</span>
                    </div>
                </div>

                <!-- Model Configuration Bar -->
                <div class="model-config" id="modelConfig" style="display: none;">
                    <select class="form-select form-select-sm me-2" id="modelSelect">
                        <option value="">Select Model...</option>
                    </select>
                    <button class="btn btn-sm btn-outline-primary" id="downloadModelBtn">
                        <i class="bi bi-download"></i> Download Model
                    </button>
                    <button class="btn btn-sm btn-outline-secondary" id="modelSettingsBtn">
                        <i class="bi bi-gear"></i> Settings
                    </button>
                </div>

                <!-- Chat Messages Container -->
                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-screen" id="welcomeScreen">
                        <div class="welcome-content">
                            <i class="bi bi-robot welcome-icon"></i>
                            <h2>Welcome to Ellem</h2>
                            <p>Local AI with a Great UI</p>
                            <p class="text-muted">Connect to a server to get started</p>
                        </div>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="input-area">
                    <div class="input-group">
                        <textarea class="form-control" id="messageInput" rows="1" placeholder="Send a message..." disabled></textarea>
                        <button class="btn btn-primary" id="sendBtn" disabled>
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals will be added here -->
    <div id="modalsContainer"></div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.0/marked.min.js"></script>
    <script src="js/db.js"></script>
    <script src="js/engines/base-engine.js"></script>
    <script src="js/engines/ollama-engine.js"></script>
    <script src="js/engines/lmstudio-engine.js"></script>
    <script src="js/engine-manager.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
