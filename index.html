<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ellem — Local AI with a Great UI</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/theme.css" rel="stylesheet">

</head>

<body class="ellem-app">

  <header class="app-header px-3 py-2">
    <div class="d-flex align-items-center justify-content-between">

      <div class="d-flex align-items-center brand">

        <img src="images/ellem.png" alt="Ellem logo" class="brand-logo me-2" style="max-height:48px">

        <div class="brand-text">
          <h1 class="brand-title mb-0">Ellem</h1>
          <small class="brand-tagline">Local AI with a Great UI</small>
        </div>

      </div>

      <div class="server-indicator">

        <span id="connection-badge" class="badge bg-secondary">
          Disconnected
        </span>

      </div>

    </div>
  </header>


  <div class="container-fluid app-container">

    <div class="row flex-nowrap h-100">

      <!-- Sidebar -->

      <aside class="col-auto sidebar px-0">

        <div class="sidebar-inner d-flex flex-column">

          <div class="sidebar-header p-3">

            <button class="btn btn-primary w-100 mb-2">
              + New Chat
            </button>

            <input type="search" class="form-control form-control-sm" placeholder="Search chats"
              aria-label="Search chats">

          </div>

          <div class="chat-list flex-grow-1 overflow-auto">

            <ul id="chat-list" class="list-group list-group-flush"></ul>

          </div>

          <div class="sidebar-footer p-3">

            <div class="mb-2">

              <label class="form-label small">Server</label>

              <select id="server-select" class="form-select form-select-sm"></select>

              <button id="add-server-btn" class="btn btn-outline-light btn-sm w-100 mt-2">
                Add Server
              </button>

            </div>

            <div class="mb-2">

              <label class="form-label small">Model</label>

              <select id="model-select" class="form-select form-select-sm"></select>

            </div>

            <div class="d-grid gap-2">

              <button class="btn btn-outline-light btn-sm">
                Import Chats
              </button>

              <button class="btn btn-outline-light btn-sm">
                Export Chats
              </button>

            </div>

          </div>

        </div>

      </aside>


      <!-- Chat Area -->

      <main class="col chat-area">

        <div class="chat-wrapper d-flex flex-column h-100">

          <!-- Chat messages -->

          <div class="chat-messages flex-grow-1 overflow-auto p-4" id="chat-messages" aria-live="polite">
          </div>


          <!-- Input -->

          <div class="chat-input-area p-3">

            <form>

              <div class="input-group">

                <textarea id="chat-input" class="form-control chat-input" rows="2"
                  placeholder="Send a message..."></textarea>

                <button type="button" id="send-button" class="btn btn-primary send-button">
                  Send
                </button>

              </div>

            </form>

          </div>

        </div>

      </main>

    </div>
  </div>


  <!-- Status Bar -->

  <footer class="status-bar px-3 py-2">

    <div class="d-flex justify-content-between align-items-center">

      <div id="status-connection">
        Not connected
      </div>

    <div id="status-performance" class="text-end">
        VRAM: -- | Tokens/sec: -- | Latency: -- | Model: --
    </div>

    </div>

  </footer>


  <div class="modal fade" id="server-modal" tabindex="-1">

    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Add Server</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

          <div class="mb-3">
            <label class="form-label">Server Name</label>
            <input id="server-name" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label">Server Type</label>

            <select id="server-type" class="form-select">
              <option value="ollama">Ollama</option>
              <option value="lmstudio">LM Studio</option>
            </select>

          </div>

          <div class="mb-3">
            <label class="form-label">Server URL</label>

            <input id="server-url" class="form-control" placeholder="http://localhost:11434">

          </div>

        </div>

        <div class="modal-footer">
          <button type="button" id="save-server-btn" class="btn btn-primary">
            Save Server
          </button>
        </div>

      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script src="js/chat-db.js"></script>
  <script src="js/server-db.js"></script>
  <script src="js/api-registry.js"></script>

  <script src="js/adapters/adapter-base.js"></script>
  <script src="js/adapters/ollama-adapter.js"></script>
  <script src="js/adapters/lmstudio-adapter.js"></script>

  <script src="js/chat-manager.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
